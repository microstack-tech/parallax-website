<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/parallax_logo_color_light.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parallax</title>
    <style>
      /* Critical: paint dark immediately */
      html, body, #root { height: 100%; background: #000; color: #fff; }
    </style>
    <script>
      (function () {
        try {
          const ls = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const wantDark = ls ? ls === "dark" : prefersDark;
          document.documentElement.classList[wantDark ? "add" : "remove"]("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
